<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width initial-scale=1">

    <title>Olive & Vine Reservation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container py-4">
        <div class="row">
            <div class="col-12">
                <div class="text-center">
                    <img src="images/logo.png" class="img-fluid" alt="Olive & Vine Logo">
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12 text-center">
                <h1>Make a reservation</h1>
            </div>
            <div class="col-12 alert">
                Our restaurant will be closed on New Year's Day.
            </div>
        
        <div class="row">
            <div class="col-12">
                <form>
                    <div>
                        <label for="res-fname">First Name: </label>
                        <input type="text" id="res-fname" name="res-fmane" required/>
                    </div>   
                    <div>
                        <label for="res-lname">Last Name: </label>
                        <input type="text" id="res-lname" name="res-lnane" required/>
                    </div>
                    <div>
                        <label for="res-email">Email: </label>
                        <input type="email" id="res-fname" name="res-fmane" required/>
                    </div>    
                    <div>
                        <label for="res-phone">Phone Number: </label>
                        <input type="tel" id="res-phone" name="res-phone"/>
                    </div>      
                    <div>
                        <label for="res-date">Reservation Date: </label>
                        <input type="date" id="res-date" name="res-date" required/>
                    </div>    
                    <div>
                        <label for="res-people">Number of People: </label>
                        <input type="range" id="res-people" name="res-people" min="1" max="10" value="5" oninput="this.nextElementSibling.value = this.value"/>
                        <output>5</output>
                    </div>
                    <div>
                        <label for="place">Location: </label>
                        <fieldset id="place">
                            <label>
                                <input type="radio" id="indoors" value="indoors" name="res-place" checked/> Indoors <br/>
                            </label>
                            <label>
                                <input type="radio" id="outdoors" value="outdoors" name="res-place"/> Outdoors <br/>
                            </label>
                        </fieldset>
                    </div> 
                    <div class="col-12">
                        <div class="text-center">
                            <button type="submit" class="btn btn-primary">Make Reservation</button>
                        </div>
                    </div> 
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>

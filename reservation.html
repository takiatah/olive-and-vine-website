<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width initial-scale=1">

    <title>Olive & Vine Reservations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles/reservation.css">
</head>
<body>
    <nav class="navigation navbar navbar-expand-lg sticky-top bg-light" >
        <div class="navigation container-fluid">
            <a class="navbar-brand nav-logo" href="index.html">
                <img src="images/logo.png" alt="Logo" class="nav-logo" width="50" height="50" class="d-inline-block">
                Olive & Vine
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#pages" aria-controls="pages" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="pages">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="menu.html">Menu</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Reservations</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="order.html">Order Online</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact Us</a>
                    </li>
                </ul>
                <form class="d-flex" role="search">
                    <input class="form-control me-2 nav-search" type="search" placeholder="Search" aria-label="Search">
                    <button class="btn btn-outline-success nav-search" id="nav-search-btn" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row">
            <div class="col-12">
                <div class="text-center logo">
                    <img src="images/logo.png" class="img-fluid" alt="Olive & Vine Logo">
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12 text-center">
                <h1>Make a reservation</h1>
            </div>
            <div class="col-12 alert">
                Our restaurant will be closed on New Year's Day.
            </div>
        
        <div class="row">
            <div class="col-12">
                <form>
                    <div>
                        <label for="res-fname">First Name: </label>
                        <input type="text" id="res-fname" name="res-fmane" required/>
                    </div>   
                    <div>
                        <label for="res-lname">Last Name: </label>
                        <input type="text" id="res-lname" name="res-lnane" required/>
                    </div>
                    <div>
                        <label for="res-email">Email: </label>
                        <input type="email" id="res-fname" name="res-fmane" required/>
                    </div>    
                    <div>
                        <label for="res-phone">Phone Number: </label>
                        <input type="tel" id="res-phone" name="res-phone"/>
                    </div>      
                    <div>
                        <label for="res-date">Reservation Date: </label>
                        <input type="date" id="res-date" name="res-date" required/>
                    </div>    
                    <div>
                        <label for="res-people">Number of People: </label>
                        <input type="number" id="res-people" name="res-people" min="1" max="10" required/>
                    </div>
                    <div>
                        <fieldset id="place">
                            <legend>Indoors or Outdoors: </legend>
                            <div>
                                <label>
                                    <input type="radio" id="indoors" value="indoors" name="res-place" checked/> Indoors <br/>
                                </label>
                            </div>
                            <div>
                                <label>
                                    <input type="radio" id="outdoors" value="outdoors" name="res-place"/> Outdoors <br/>
                                </label>
                            </div>
                        </fieldset>
                    </div> 
                    <div>
                        <label>
                        <input id="policy" type="checkbox" required> I agree to the cancellation policy
                        </label>
                    </div>
                    <div class="col-12">
                        <div class="text-center">
                            <button type="submit" class="btn btn-primary">Make Reservation</button>
                        </div>
                    </div> 
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
